name: Deploy to Azure Function on Tag

on:
  push:
    tags:
      - "v*"

env:
  AZURE_FUNCTION_APP_NAME: cais-af-picqer-order-lookup
  NODE_VERSION: "22.x"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Create deployment package
        run: |
          zip -r deploy.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude "node_modules/*" \
            --exclude "deploy.zip"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTION_APP_NAME }}
          package: deploy.zip
          scm-do-build-during-deployment: true
          enable-oryx-build: true

      - name: Notify on success
        run: |
          echo "Deployment successful for tag: ${{ github.ref_name }}"
          echo "Function App: ${{ env.AZURE_FUNCTION_APP_NAME }}"
